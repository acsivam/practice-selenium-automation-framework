name: Selenium Automation Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Check Java version
        run: java -version

      - name: Run tests
        run: mvn clean test